name: Deploy to Droplet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 161.35.119.24
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            cd /root/agent
            git pull origin main
            systemctl restart redeye
            systemctl is-active redeye
