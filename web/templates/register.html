{% extends 'base.html' %}
{% block title %}Register - Red-Eye Agent{% endblock %}
{% block content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
    <div class="card" style="width: 100%; max-width: 400px;">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Register</h2>
        {% if error %}
        <div style="color: #e94560; background-color: #0f3460; padding: 0.75rem; border-radius: 4px; margin-bottom: 1rem;">
            {{ error }}
        </div>
        {% endif %}
        <form method="POST" action="/register">
            <div style="margin-bottom: 1rem;">
                <label for="email" style="display: block; margin-bottom: 0.5rem;">Email</label>
                <input type="email" id="email" name="email" required style="width: 100%; padding: 0.75rem; background-color: #0f3460; border: 1px solid #16213e; border-radius: 4px; color: #eee;">
            </div>
            <div style="margin-bottom: 1.5rem;">
                <label for="password" style="display: block; margin-bottom: 0.5rem;">Password</label>
                <input type="password" id="password" name="password" required style="width: 100%; padding: 0.75rem; background-color: #0f3460; border: 1px solid #16213e; border-radius: 4px; color: #eee;">
            </div>
            <button type="submit" style="width: 100%; padding: 0.75rem; background-color: #e94560; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer;">Register</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem;">
            Already have an account? <a href="/login" style="color: #e94560;">Login</a>
        </p>
    </div>
</div>
{% endblock %}
