<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Red-Eye Agent{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background-color: #1a1a2e;
            color: #eee;
            line-height: 1.6;
            min-height: 100vh;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        nav {
            background-color: #16213e;
            padding: 1rem 0;
            border-bottom: 2px solid #e94560;
        }
        .nav-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #e94560;
            text-decoration: none;
        }
        .nav-links {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .nav-links a {
            color: #eee;
            text-decoration: none;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #e94560;
        }
        main {
            padding: 2rem 0;
        }
        .card {
            background-color: #16213e;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid #0f3460;
        }
        code, pre {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0f3460;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-size: 0.9em;
        }
        pre {
            padding: 1rem;
            overflow-x: auto;
        }
        footer {
            text-align: center;
            padding: 1.5rem 0;
            color: #888;
            font-size: 0.9rem;
            border-top: 1px solid #0f3460;
            margin-top: 2rem;
        }
        @media (max-width: 768px) {
            .nav-container {
                flex-direction: column;
                gap: 1rem;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="container nav-container">
            <a href="/" class="nav-title">Red-Eye Agent</a>
            <div class="nav-links">
                <a href="/">Dashboard</a>
                <a href="/command-center">Command Center</a>
                <a href="/checklist">Checklist</a>
                <a href="/runs">Runs</a>
                {% if user_email is defined and user_email %}
                <a href="/logout">Logout</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <div class="container">
            Red-Eye Agent &copy; {{ now.year if now else '2025' }}
        </div>
    </footer>
</body>
</html>
