{% extends "base.html" %}
{% block title %}Run Logs — Red-Eye Agent{% endblock %}
{% block content %}
<div class="card">
    <h2>Run Logs</h2>
    <ul style="list-style: none; padding: 0; margin-top: 1rem;">
        {% for file in log_files %}
        <li style="margin-bottom: 0.75rem;">
            <a href="/runs/{{ file.filename }}" style="color: #e94560; text-decoration: none;">{{ file.display_name }}</a>
            <span style="color: #888; font-size: 0.9rem; margin-left: 0.5rem;">{{ file.timestamp }}</span>
        </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
