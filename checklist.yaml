# ─────────────────────────────────────────────────────────────
# Task Checklist — Run 4: Safety, Web Checklist Editor, PR Flow
# ─────────────────────────────────────────────────────────────
# Status values: pending | in_progress | done | failed | timeout | budget_exceeded

tasks:
  # ── Safety: Protected Files ───────────────────────────────

  - id: 1
    repo: "red-eye-agent"
    description: >
      Add a protected files feature to task_executor.py. Define a
      list PROTECTED_FILES at module level containing:
      ["agent_runner.py", "task_executor.py", "git_manager.py",
      "llm_client.py", "logger_setup.py", ".env", ".gitignore"].
      In _apply_changes(), before processing any change with action
      "delete", check if the file path matches any entry in
      PROTECTED_FILES. If it does, log a warning
      "Blocked delete of protected file: {file}" and skip it.
      For "edit" actions, allow edits but log an info message
      "Editing protected file: {file}" so it shows in the run log.
      Do NOT block edits, only block deletes of protected files.
    status: pending
    context_files:
      - "task_executor.py"

  # ── Safety: Secrets Scanner ───────────────────────────────

  - id: 2
    repo: "red-eye-agent"
    description: >
      Add a secrets scanner to task_executor.py. Create a function
      _scan_for_secrets(content: str) -> list[str] that checks file
      content for secrets using these regex patterns: AWS access keys
      (AKIA[0-9A-Z]{16}), GitHub tokens (gh[ps]_[A-Za-z0-9]{36,}
      or github_pat_[A-Za-z0-9_]{20,}), generic API keys
      ((?i)(api[_-]?key|secret[_-]?key|password)\s*[=:]\s*["'][^"']{8,}["']).
      In _apply_changes(), after writing any file (create or edit),
      read back the content and run _scan_for_secrets(). If any
      matches are found, log a warning "Potential secret detected in
      {file}: {pattern_name}" but still allow the commit. Return the
      list of warnings. Keep it simple — just regex, no external deps.
    status: pending
    context_files:
      - "task_executor.py"

  # ── Web: Checklist Editor ─────────────────────────────────

  - id: 3
    repo: "red-eye-agent"
    description: >
      Add a POST /checklist/save route to web/app.py that accepts
      a form field "tasks_yaml" (raw YAML text) and writes it to
      the checklist.yaml file. Validate that the YAML parses
      correctly and has a "tasks" key that is a list before saving.
      If validation fails, redirect back to /checklist with an
      error query parameter. If it succeeds, save the file and
      redirect to /checklist. Require authentication via the
      get_current_user dependency.
    status: pending
    context_files:
      - "web/app.py"
      - "checklist.yaml"

  - id: 4
    repo: "red-eye-agent"
    description: >
      Update web/templates/checklist.html to add a "Edit Checklist"
      section below the task table. Add a textarea (id="tasks_yaml",
      name="tasks_yaml") that is pre-filled with the current
      checklist.yaml content. Below it add a "Save Checklist" submit
      button that POSTs to /checklist/save. Style the textarea with
      dark background (#16213e), monospace font, full width, min
      height 300px, white text. If the URL has an "error" query
      param, show a red alert div above the textarea saying
      "Invalid YAML — please check your syntax." Wrap it all in
      a form tag. Keep existing task table above unchanged.
    status: pending
    context_files:
      - "web/templates/checklist.html"
      - "web/app.py"

  # ── Web: Read checklist content for editor ────────────────

  - id: 5
    repo: "red-eye-agent"
    description: >
      Update the GET /checklist route in web/app.py to also pass
      the raw checklist YAML content to the template. Read the
      checklist.yaml file as a string and pass it as
      "checklist_raw" in the template context, alongside the
      existing "tasks" list. Also pass any "error" query parameter
      from the request as "error" in the context. Import the
      Request query_params for this.
    status: pending
    context_files:
      - "web/app.py"

  # ── Auto PR Creation ──────────────────────────────────────

  - id: 6
    repo: "red-eye-agent"
    description: >
      Add a function create_pull_request(repo_name, branch_name,
      title, body) to git_manager.py. Use the urllib.request module
      (no external deps) to call the GitHub API:
      POST https://api.github.com/repos/{owner}/{repo}/pulls
      with JSON body {"title": title, "body": body, "head":
      branch_name, "base": "main"}. Use the GITHUB_PAT from
      environment for Bearer auth. Return the PR URL on success
      or None on failure. Log the result. Import os to read
      the PAT from os.environ.
    status: pending
    context_files:
      - "git_manager.py"

  - id: 7
    repo: "red-eye-agent"
    description: >
      Update agent_runner.py to call create_pull_request() at the
      end of each repo's task processing, after all tasks are done.
      Import create_pull_request from git_manager. Build a PR title
      like "Red-Eye Agent Run {date}" and a body that lists each
      completed and failed task with its ID and description (first
      60 chars). Only create the PR if at least one task was
      committed. Store the PR URL in the results dict under
      "pr_url". Log the PR URL.
    status: pending
    context_files:
      - "agent_runner.py"
      - "git_manager.py"

  # ── Post-run Diff Summary ─────────────────────────────────

  - id: 8
    repo: "red-eye-agent"
    description: >
      Add a function generate_diff_summary(git_manager, branch_name,
      log_dir) to report.py. It should run
      "git diff main..{branch_name} --stat" to get a summary of
      changed files and lines. Write this to a file
      "logs/diff_summary_YYYY-MM-DD.md" with a heading and the
      stat output in a code block. Call it from agent_runner.py
      right after generate_report(), passing the git manager
      instance for the repo.
    status: pending
    context_files:
      - "report.py"
      - "agent_runner.py"
      - "git_manager.py"
