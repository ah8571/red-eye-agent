# ─────────────────────────────────────────────────────────────
# Task Checklist — Run 5: Multi-Agent Command Center
# ─────────────────────────────────────────────────────────────
# Status values: pending | in_progress | done | failed | timeout | budget_exceeded

tasks:
  # ── Foundation: Process Manager ───────────────────────────

  - id: 1
    repo: "red-eye-agent"
    description: >
      Create a new file process_manager.py at the project root.
      Define a class RunManager with these methods:

      __init__(self, runs_dir="runs"): Sets self.runs_dir to a Path,
      creates it if missing, loads registry from runs_dir/registry.json
      (or empty dict if not found).

      start_run(self, run_id, repo_name, checklist_path, config_path="config.yaml") -> dict:
      Creates a subdirectory runs/{run_id}/. Copies the checklist file
      into that directory as checklist.yaml. Spawns agent_runner.py
      as a subprocess: subprocess.Popen([sys.executable, "agent_runner.py",
      "--config", config_path, "--checklist", str(runs/{run_id}/checklist.yaml)],
      stdout=open(runs/{run_id}/output.log, "w"),
      stderr=subprocess.STDOUT). Stores in registry: {run_id: {pid, repo,
      started_at (ISO string), status: "running", log_file, checklist_file}}.
      Saves registry. Returns the entry.

      get_status(self, run_id) -> dict: Reads the run's checklist.yaml
      to get task statuses (counts of pending/in_progress/done/failed).
      Checks if PID is still alive (os.kill(pid, 0) wrapped in try/except).
      If process is dead and was "running", updates status to "finished".
      Returns {run_id, pid, repo, started_at, status, tasks: {total, done, failed, pending}}.

      stop_run(self, run_id) -> bool: Sends SIGTERM (os.kill(pid, signal.SIGTERM))
      to the process. Updates status to "stopped". Returns True on success.

      list_runs(self) -> list[dict]: Returns get_status() for each run in registry,
      sorted by started_at descending.

      _save_registry(self): Writes self.registry to runs/registry.json.
      _load_registry(self): Reads runs/registry.json into self.registry.

      Import: subprocess, sys, os, signal, json, shutil, yaml, datetime, pathlib, logging.
      Use logging.getLogger("agent.process_manager").
    status: pending
    context_files:
      - "agent_runner.py"

  # ── Web API: Start Run ────────────────────────────────────

  - id: 2
    repo: "red-eye-agent"
    description: >
      Add a new POST route /api/runs/start to web/app.py. It requires
      authentication (use the get_current_user dependency). Accepts
      JSON body with fields: repo (string, required), tasks (list of
      strings, each is a task description). The route should:
      1) Generate a run_id as "{repo}-{datetime.now().strftime('%Y%m%d-%H%M%S')}".
      2) Build a checklist dict: {"tasks": [{"id": i+1, "repo": repo,
         "description": desc, "status": "pending", "context_files": []}
         for i, desc in enumerate(tasks)]}.
      3) Write it to a temp file using yaml.dump.
      4) Import RunManager from process_manager. Create a RunManager instance.
      Call start_run(run_id, repo, temp_checklist_path).
      5) Return JSON: {"run_id": run_id, "status": "started"}.
      Add "from pydantic import BaseModel" and create a StartRunRequest
      model with fields repo: str and tasks: list[str].
      Add proper error handling: if repo not in config repos list, return 400.
    status: pending
    context_files:
      - "web/app.py"
      - "process_manager.py"

  # ── Web API: Stop Run ─────────────────────────────────────

  - id: 3
    repo: "red-eye-agent"
    description: >
      Add a POST route /api/runs/{run_id}/stop to web/app.py.
      Requires authentication. Creates a RunManager instance, calls
      stop_run(run_id). Returns JSON {"run_id": run_id, "status": "stopped"}
      on success, or 404 with {"error": "Run not found"} if the
      run_id is not in the registry.
    status: pending
    context_files:
      - "web/app.py"
      - "process_manager.py"

  # ── Web API: Run Status ───────────────────────────────────

  - id: 4
    repo: "red-eye-agent"
    description: >
      Add two GET routes to web/app.py:
      1) GET /api/runs — returns JSON list of all runs from
         RunManager().list_runs(). Requires authentication.
      2) GET /api/runs/{run_id}/status — returns JSON from
         RunManager().get_status(run_id). Requires authentication.
         Returns 404 if run_id not found.
    status: pending
    context_files:
      - "web/app.py"
      - "process_manager.py"

  # ── Web API: Log Tail ─────────────────────────────────────

  - id: 5
    repo: "red-eye-agent"
    description: >
      Add a GET route /api/runs/{run_id}/logs to web/app.py.
      Requires authentication. Reads the last 200 lines of the run's
      output.log file (path from RunManager().get_status(run_id)["log_file"]).
      Returns JSON {"run_id": run_id, "lines": [...last 200 lines...]}.
      Use a deque(maxlen=200) to efficiently read last lines.
      If log file not found, return {"run_id": run_id, "lines": []}.
      Import collections.deque for this.
    status: pending
    context_files:
      - "web/app.py"
      - "process_manager.py"

  # ── Web UI: Command Center Page ───────────────────────────

  - id: 6
    repo: "red-eye-agent"
    description: >
      Create a new template web/templates/command_center.html extending
      base.html. This page has two sections:

      Section 1 — "Launch New Run": A form with a <select> dropdown
      for repo (populated from a template variable "repos"), a <textarea>
      for task descriptions (placeholder: "Enter one task per line"),
      and a Submit button. The form uses JavaScript fetch() to POST
      to /api/runs/start with JSON body {repo: selected_repo,
      tasks: textarea.value.split('\n').filter(line => line.trim())}.
      On success, show an alert with the run_id and reload the page.
      On error, show the error message.

      Section 2 — "Active Runs": A table with columns: Run ID, Repo,
      Started, Status, Progress, Actions. Use a template variable
      "active_runs" (list of dicts with those fields). Progress shows
      "done/total tasks". Actions column has a "Stop" button (red, calls
      fetch POST /api/runs/{run_id}/stop then reloads) and a "Logs"
      link to /command-center/{run_id}/logs.

      Use the same dark card styling as dashboard.html. Add the page
      title as "Command Center".
    status: pending
    context_files:
      - "web/templates/dashboard.html"
      - "web/templates/base.html"

  # ── Web UI: Command Center Route ──────────────────────────

  - id: 7
    repo: "red-eye-agent"
    description: >
      Add a GET route /command-center to web/app.py. Requires authentication.
      It loads the repos list from config.yaml (same as the dashboard route does),
      creates a RunManager(), calls list_runs() to get active runs, and renders
      command_center.html passing repos and active_runs.
      Also add a GET route /command-center/{run_id}/logs that renders a new
      simple template showing the run's log output. Create
      web/templates/run_logs.html extending base.html with a <pre> block
      for the log content and a JavaScript setInterval that fetches
      /api/runs/{run_id}/logs every 5 seconds and updates the <pre>
      content. Add a "Back to Command Center" link.
      Finally, add a "Command Center" link to the nav bar in base.html,
      right after the Dashboard link, pointing to /command-center.
    status: pending
    context_files:
      - "web/app.py"
      - "web/templates/base.html"
      - "web/templates/dashboard.html"

  # ── Integration: Update Dashboard ─────────────────────────

  - id: 8
    repo: "red-eye-agent"
    description: >
      Update the dashboard route (GET /) in web/app.py to also show
      active agent runs. Import RunManager from process_manager. In
      the dashboard handler, create a RunManager(), call list_runs(),
      filter to only runs with status "running", and pass as
      "active_runs" to the template. In dashboard.html, add a new
      card section before the existing repos card titled "Active Runs"
      with a count badge. If active_runs is not empty, show a small
      table with Run ID, Repo, Progress (done/total), and a link
      to /command-center/{run_id}/logs. If empty, show
      "No active runs" in muted text. Add a prominent "Launch New Run"
      button (green, links to /command-center) above the Active Runs section.
    status: pending
    context_files:
      - "web/app.py"
      - "web/templates/dashboard.html"
      - "process_manager.py"
