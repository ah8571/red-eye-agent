# ─────────────────────────────────────────────────────────────
# Task Checklist — Run 6: Multi-Format Checklist Import
# ─────────────────────────────────────────────────────────────
# Status values: pending | in_progress | done | failed | timeout | budget_exceeded

tasks:
  # ── Markdown Parser ───────────────────────────────────────

  - id: 1
    repo: "red-eye-agent"
    description: >
      Create a new file checklist_parser.py at the project root.
      Define a function parse_markdown(text: str, repo: str) -> dict
      that converts markdown text into a checklist dict. The markdown
      format is: lines starting with "- " are task descriptions.
      Indented lines starting with "  - context:" followed by a
      comma-separated list of filenames are context_files for the
      preceding task. Lines starting with "## " or "# " are section
      headers and should be ignored. Blank lines are ignored.
      Multi-line task descriptions are supported: if a line does not
      start with "- " or "  - context:" and is not a heading or blank,
      it is appended to the previous task's description.
      Return format: {"tasks": [{"id": 1, "repo": repo,
      "description": "...", "status": "pending",
      "context_files": ["file1.py", "file2.py"]}]}.
      Also define parse_yaml_text(text: str) -> dict that takes raw
      YAML text, parses it with yaml.safe_load, validates it has a
      "tasks" key that is a list where each item has "id", "repo",
      "description", and "status" keys. Returns the parsed dict.
      Raises ValueError with a descriptive message on any validation
      failure. Import yaml, re, logging. Add unit tests: create
      tests/test_checklist_parser.py with tests for parse_markdown
      (valid input with context files, input without context files,
      empty input returns empty tasks list) and parse_yaml_text
      (valid yaml, invalid yaml raises ValueError, missing tasks key
      raises ValueError).
    status: pending
    context_files:
      - "checklist.yaml"

  # ── Update API to accept format param ─────────────────────

  - id: 2
    repo: "red-eye-agent"
    description: >
      Update the POST /api/runs/start route in web/app.py. Change
      the StartRunRequest Pydantic model to have these fields:
      repo (str), input_text (str), format (str, default "quick").
      Format can be "quick", "markdown", or "yaml".
      In the route handler:
      - If format == "quick": split input_text by newlines, filter
        empty lines, build tasks list as before (each line is a task
        description, no context_files).
      - If format == "markdown": import parse_markdown from
        checklist_parser and call parse_markdown(input_text, repo).
        Use the returned dict directly as the checklist.
      - If format == "yaml": import parse_yaml_text from
        checklist_parser and call parse_yaml_text(input_text). Use
        the returned dict directly as the checklist.
      - If format is not one of the three, return 400 with
        "Invalid format" error.
      Remove the old "tasks" field from StartRunRequest. The rest
      of the route (generating run_id, writing temp file, calling
      RunManager) stays the same. Add proper error handling: if
      parse_markdown or parse_yaml_text raises ValueError, return
      400 with the error message.
    status: pending
    context_files:
      - "web/app.py"
      - "checklist_parser.py"

  # ── Tabbed UI for Command Center ──────────────────────────

  - id: 3
    repo: "red-eye-agent"
    description: >
      Update web/templates/command_center.html to replace the single
      textarea with a tabbed interface. Add three tab buttons above
      the input area: "Quick", "Markdown", "YAML". Style them as
      horizontal buttons with the active tab having background
      #e94560 and inactive tabs having background #0f3460. Use
      JavaScript to show/hide the corresponding input panel when
      a tab is clicked.
      Quick tab: shows a textarea with placeholder "Enter one task
      per line" (the existing behavior).
      Markdown tab: shows a textarea with placeholder text showing
      the format example:
      "## Section Name\n- Task description here\n  - context: file1.py, file2.py\n- Another task\n  - context: web/app.py"
      and a small help text div below saying "Lines starting with -
      are tasks. Indent with context: for file hints."
      YAML tab: shows a textarea with placeholder "Paste full
      checklist YAML here" and help text "Must have a tasks: key
      with a list of task objects."
      All textareas should have the same styling: dark background
      (#16213e), monospace font, white text, full width, min-height
      300px, border-radius 4px.
      Update the JavaScript submit handler to read a hidden input
      or determine which tab is active, and send the correct
      "format" value ("quick", "markdown", or "yaml") along with
      "input_text" (the active textarea value) and "repo" in the
      POST body to /api/runs/start.
      Keep the Active Runs table section unchanged below the form.
    status: pending
    context_files:
      - "web/templates/command_center.html"

  # ── File Upload Support ───────────────────────────────────

  - id: 4
    repo: "red-eye-agent"
    description: >
      Add file upload support to the command center. Add a new
      POST route /api/runs/upload in web/app.py that accepts a
      multipart form with fields: repo (str), file (UploadFile).
      Import UploadFile and File from fastapi. Read the uploaded
      file content as text. Detect format by file extension:
      .md -> "markdown", .yaml or .yml -> "yaml", anything else
      -> return 400 "Unsupported file type". Use the same
      parse_markdown or parse_yaml_text from checklist_parser
      to parse the content. Then proceed the same as /api/runs/start:
      generate run_id, write temp checklist, call RunManager.
      Return JSON {"run_id": run_id, "status": "started"}.
      Requires authentication via get_current_user.
      In command_center.html, add a file upload area below the
      tabs section. Add a div with a dashed border (#0f3460),
      containing a file input (accept=".md,.yaml,.yml") and
      a small "Upload & Run" button. When the file is selected
      and button clicked, use JavaScript FormData to POST to
      /api/runs/upload. On success, alert the run_id and reload.
      Style the upload area to match the dark theme.
    status: pending
    context_files:
      - "web/app.py"
      - "web/templates/command_center.html"
      - "checklist_parser.py"

  # ── Repo Dropdown from Config ─────────────────────────────

  - id: 5
    repo: "red-eye-agent"
    description: >
      Currently the /api/runs/start route validates that repo is in
      the config's repos list, but it compares the repo string against
      the full repo dict objects. Fix this: when loading repos from
      config.yaml, extract just the repo names as a list with
      [r["name"] for r in repos]. Use that list for validation
      (check if request.repo is in repo_names). Also fix the repo
      validation in the /api/runs/upload route the same way.
      Additionally, update the /command-center route to pass just
      repo names to the template if it currently passes full repo
      dicts, so the <select> options render correctly.
    status: pending
    context_files:
      - "web/app.py"
      - "config.yaml"

  # ── Markdown Format Documentation ─────────────────────────

  - id: 6
    repo: "red-eye-agent"
    description: >
      Add a GET route /command-center/help to web/app.py that
      renders a new template web/templates/import_help.html.
      This template extends base.html and shows documentation
      for all three input formats with examples. Include:
      1) Quick format: "One task per line. No context files."
      with a code block example.
      2) Markdown format: explain the format with a full example
      showing section headers, task descriptions, multi-line
      descriptions, and context file lines. Show a sample like:
      ## Safety\n- Add input validation to the login form\n  - context: web/auth.py, web/templates/login.html\n## Features\n- Create a new API endpoint for user profiles\n  - context: web/app.py
      3) YAML format: Show the full checklist.yaml structure
      with id, repo, description, status, context_files.
      Style all code examples with dark background (#16213e),
      monospace, white text, padding, border-radius.
      Add a link from command_center.html to this help page
      (small "Format Help" link next to the tab buttons).
      Requires authentication.
    status: pending
    context_files:
      - "web/app.py"
      - "web/templates/command_center.html"

  # ── Preview Before Launch ─────────────────────────────────

  - id: 7
    repo: "red-eye-agent"
    description: >
      Add a POST route /api/runs/preview to web/app.py that accepts
      the same StartRunRequest body as /api/runs/start but does NOT
      start a run. Instead it parses the input (using the same
      format logic) and returns JSON with {"tasks": [...list of
      task dicts with id, description, context_files...],
      "count": number_of_tasks}. This lets the user preview what
      will be submitted before launching.
      In command_center.html, add a "Preview" button next to the
      "Start Run" button. When clicked, it sends the same data to
      /api/runs/preview instead. Display the result in a div below
      the form: show a count ("X tasks parsed") and a list of task
      descriptions (truncated to 100 chars each) with their context
      files. Style as a dark card. If there's an error (400), show
      it in red text. Add a "Confirm & Launch" button in the
      preview div that sends the same data to /api/runs/start.
      Requires authentication.
    status: pending
    context_files:
      - "web/app.py"
      - "web/templates/command_center.html"

  # ── Error Handling & Validation ───────────────────────────

  - id: 8
    repo: "red-eye-agent"
    description: >
      Improve error handling across the import flow. In
      checklist_parser.py, add a function validate_checklist_dict(data: dict)
      -> list[str] that checks: tasks key exists and is a list;
      each task has id (int), repo (str), description (str), status (str);
      status is one of "pending", "in_progress", "done", "failed",
      "timeout", "budget_exceeded"; task IDs are unique; descriptions
      are not empty. Returns list of error messages (empty = valid).
      Call validate_checklist_dict in both parse_markdown and
      parse_yaml_text before returning, and raise ValueError with
      joined errors if any.
      In web/app.py, update the /api/runs/start and /api/runs/upload
      routes to catch ValueError from the parsers and return 400
      with a JSON body {"error": str(e)} instead of a plain text
      error. Update the JavaScript in command_center.html to parse
      JSON error responses and display the error message to the user
      in a red-styled div below the form instead of using alert().
    status: pending
    context_files:
      - "checklist_parser.py"
      - "web/app.py"
      - "web/templates/command_center.html"
